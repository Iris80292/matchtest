<script>
let current = 0;
let answers = {};

const userName = localStorage.getItem('userName') || '对方';
document.getElementById('quizTitle').innerText = `${userName} 的相性测试`;

const urlParams = new URLSearchParams(window.location.search);
const idParam = urlParams.get('id');
let ownerAnswers = null;
let ownerName = null;

try {
  if (idParam) {
    // ✅ 修复：支持中文解码
    const jsonStr = decodeURIComponent(escape(atob(idParam)));
    const data = JSON.parse(jsonStr);
    ownerAnswers = data.answers;
    ownerName = data.name;
  }
} catch (e) {
  console.error("解析失败", e);
}

// ...剩下代码不用动...
</script>
