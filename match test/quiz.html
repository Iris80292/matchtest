<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相性测试</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 id="quizTitle">相性测试</h1>
    <div class="progress" id="progress"></div>
    <div id="question-box"></div>

    <button class="btn" id="prevBtn" style="background:#888; margin-bottom:0;">上一题</button>
    <button class="btn" id="nextBtn">下一题</button>
    <button class="btn" id="submit" style="background:#ff4d4f; margin-top:8px;">查看默契结果</button>
  </div>

  <script src="questions.js"></script>
  <script>
    let current = 0;
    let answers = {};

    // 读取昵称
    const userName = localStorage.getItem('userName') || '对方';
    document.getElementById('quizTitle').innerText = `${userName} 的相性测试`;

    // 从链接获取主人答案
    const urlParams = new URLSearchParams(window.location.search);
    const idParam = urlParams.get('id');
    let ownerAnswers = null;

    try {
      if (idParam) {
        const data = JSON.parse(atob(idParam));
        ownerAnswers = data.answers;
      }
    } catch (e) {}

    function showQuestion() {
      const q = questions[current];
      const box = document.getElementById('question-box');
      const prog = document.getElementById('progress');
      prog.textContent = `第 ${current+1}/${questions.length} 题`;

      let html = `<div class="question"><h3>${q.title}</h3>`;
      q.options.forEach((opt, i) => {
        const cls = answers[q.id] === i ? 'option selected' : 'option';
        html += `<div class="${cls}" data-idx="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`;
      });
      html += '</div>';
      box.innerHTML = html;

      box.querySelectorAll('.option').forEach(el => {
        el.onclick = () => {
          answers[q.id] = parseInt(el.dataset.idx);
          showQuestion();
        };
      });
    }

    document.getElementById('nextBtn').onclick = () => {
      if (answers[questions[current].id] === undefined) {
        alert('请选择一个选项');
        return;
      }
      if (current < questions.length - 1) {
        current++;
        showQuestion();
      }
    };

    document.getElementById('prevBtn').onclick = () => {
      if (current > 0) {
        current--;
        showQuestion();
      }
    };

    document.getElementById('submit').onclick = () => {
      if (Object.keys(answers).length < questions.length) {
        alert('请完成所有题目');
        return;
      }

      if (!ownerAnswers) {
        // 生成自己的测试：带上名字
        localStorage.setItem('myAnswers', JSON.stringify(answers));
        location.href = 'result.html';
        return;
      }

      // 计算默契
      let sameTotal = 0;
      let lifeCnt = 0, lifeSame = 0;
      let dreamCnt = 0, dreamSame = 0;
      let careerCnt = 0, careerSame = 0;
      let valueCnt = 0, valueSame = 0;

      questions.forEach(q => {
        const o = ownerAnswers[q.id];
        const m = answers[q.id];
        if (o === undefined || m === undefined) return;
        sameTotal += (o === m) ? 1 : 0;

        switch (q.type) {
          case 'life': lifeCnt++; lifeSame += (o === m); break;
          case 'dream': dreamCnt++; dreamSame += (o === m); break;
          case 'career': careerCnt++; careerSame += (o === m); break;
          case 'value': valueCnt++; valueSame += (o === m); break;
        }
      });

      const total = (sameTotal / questions.length * 100).toFixed(1);
      const life = (lifeSame / lifeCnt * 100).toFixed(1);
      const dream = (dreamSame / dreamCnt * 100).toFixed(1);
      const career = (careerSame / careerCnt * 100).toFixed(1);
      const value = (valueSame / valueCnt * 100).toFixed(1);

      localStorage.setItem('matchResult', JSON.stringify({ total, life, dream, career, value }));
      location.href = 'match-result.html';
    };

    showQuestion();
  </script>
</body>
</html>
