<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>默契度测试</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #e9e5ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .cover-card {
      background: white;
      border-radius: 28px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    .cover-icon {
      width: 80px;
      height: 80px;
      background: #6366f1;
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
    }
    .cover-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #222;
    }
    .cover-desc {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .name-input {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      text-align: center;
      margin-bottom: 20px;
      outline: none;
    }
    .name-input:focus {
      border-color: #6366f1;
    }
  </style>
</head>
<body>

  <div class="cover-card">
    <div class="cover-icon">💞</div>
    <h1 class="cover-title">默契度测试</h1>
    <p class="cover-desc">输入你的名字，再生成专属相性测试</p>

    <input type="text" class="name-input" id="username" placeholder="请输入你的昵称" autocomplete="off">

    <button class="btn" id="startBtn">开始创建我的测试</button>
  </div>

<script>
  document.getElementById('startBtn').onclick = function(){
    const name = document.getElementById('username').value.trim();
    if(!name){
      alert('请先输入你的昵称');
      return;
    }
    localStorage.setItem('userName', name);
    location.href = 'quiz.html';
  }
</script>

</body>
</html>
