<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成相性测试</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 id="resultTitle">✅ 你的相性测试已生成</h1>
    <p class="desc">把链接发给好友，测测你们的默契</p>

    <div id="link-box" style="padding:12px; background:#f1f3f6; border-radius:8px; margin:20px 0; word-break:break-all; text-align:center;">
      正在生成链接...
    </div>

    <button class="btn" id="copyBtn" style="background:#20c997;">复制链接</button>
    <a href="index.html" class="btn" style="background:#6c757d;">返回首页</a>
  </div>

<script>
const userName = localStorage.getItem('userName') || '某人';
document.getElementById('resultTitle').innerText = `${userName} 的相性测试`;

const myAnswers = JSON.parse(localStorage.getItem('myAnswers'));

if (!myAnswers) {
  document.getElementById('link-box').innerText = "未找到答案，请重新答题";
} else {
  // 打包名字和答案
  const data = {
    name: userName,
    answers: myAnswers
  };
  const encoded = btoa(JSON.stringify(data));
  
  // ✅ 修复：用当前页面域名 + 相对路径拼接链接
  const shareLink = `${window.location.protocol}//${window.location.host}/quiz.html?id=${encoded}`;
  
  document.getElementById('link-box').innerText = shareLink;

  document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(shareLink).then(() => {
      alert("链接复制成功！");
    }).catch(() => {
      alert("复制失败，请手动复制链接");
    });
  };
}
</script>
</body>
</html>
